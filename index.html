<!DOCTYPE html>
<html>
    <head>
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r124/three.min.js"></script>
        <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.1.4/dist/mindar-image-three.prod.js"></script>
        <script src="./main.js"></script>

        <style>
            html, body {
                position: relative; margin: 0; width: 100%; height: 100%; overflow: hidden;
                font-family: sans-serif;
            }

            /* ── 갤러리 화면 ── */
            #gallery-screen {
                position: fixed;
                inset: 0;
                background: #111;
                color: #fff;
                display: flex;
                flex-direction: column;
                align-items: center;
                justify-content: center;
                gap: 24px;
                z-index: 999;
            }

            #gallery-screen h2 {
                margin: 0;
                font-size: 1.4rem;
                letter-spacing: 0.05em;
            }

            /* 업로드 버튼 */
            #upload-label {
                display: inline-block;
                padding: 12px 28px;
                background: #fff;
                color: #111;
                border-radius: 8px;
                cursor: pointer;
                font-size: 1rem;
                font-weight: bold;
                transition: background 0.2s;
            }
            #upload-label:hover { background: #ddd; }
            #file-input { display: none; }

            /* 미리보기 그리드 */
            #preview-grid {
                display: flex;
                flex-wrap: wrap;
                gap: 12px;
                justify-content: center;
                max-width: 90vw;
                max-height: 50vh;
                overflow-y: auto;
            }

            .preview-item {
                width: 100px;
                height: 100px;
                object-fit: cover;
                border-radius: 8px;
                border: 3px solid transparent;
                cursor: pointer;
                transition: border-color 0.2s, transform 0.2s;
            }
            .preview-item:hover  { transform: scale(1.05); }
            .preview-item.selected { border-color: #4af; }

            /* AR 시작 버튼 */
            #start-ar-btn {
                padding: 12px 36px;
                background: #4af;
                color: #fff;
                border: none;
                border-radius: 8px;
                font-size: 1rem;
                font-weight: bold;
                cursor: pointer;
                display: none;          /* 이미지 선택 후에만 표시 */
                transition: background 0.2s;
            }
            #start-ar-btn:hover { background: #39d; }
        </style>
    </head>
    <body>

        <!-- 갤러리 / 이미지 선택 화면 -->
        <div id="gallery-screen">
            <h2>🖼 AR에 띄울 이미지를 선택하세요</h2>

            <label id="upload-label" for="file-input">📁 이미지 업로드</label>
            <input id="file-input" type="file" accept="image/*" multiple>

            <div id="preview-grid"></div>

            <button id="start-ar-btn">▶ AR 시작</button>
        </div>

        <!-- AR 뷰 (main.js가 동적으로 생성) -->

    </body>
</html>
